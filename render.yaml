services:
  - type: web
    name: ojt-tracker
    env: python
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn ojt_tracker.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ojt-tracker-db
          property: connectionString

databases:
  - name: ojt-tracker-db
    databaseName: ojt_tracker
    user: ojt_user
